# ============================================
# Flink 实时推荐系统 - 配置文件
# ============================================

# --- Socket 数据源配置 ---
socket.host=node1
socket.port=9999

# --- MySQL 数据库配置 ---
mysql.url=jdbc:mysql://192.168.88.8:3306/recommend_db?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true
mysql.username=flinkpy
mysql.password=123456

# --- PMML 模型配置 ---
pmml.model.path=recommend_model_champion.pmml

# --- 冷启动默认值 ---
coldstart.buy.rate=0.05
coldstart.active.score=1.0

# --- TopK 排序配置 ---
topk.k=10
topk.flush.interval.ms=5000

# --- 滑动窗口配置 ---
window.size.minutes=5
window.slide.minutes=1

# --- 批处理数据文件 ---
batch.train.file=data/train.csv
batch.test.file=data/test.csv

# --- Flink 运行参数 ---
flink.parallelism=1
