# ==============================================
# Flink 实时推荐系统 - 统一配置文件
# ==============================================

# ---- Flink 配置 ----
flink.parallelism=1
flink.checkpoint.interval.ms=60000

# ---- Socket 配置 ----
socket.host=node1
socket.port=9999

# ---- MySQL 数据库配置 ----
mysql.url=jdbc:mysql://192.168.88.6:3306/recommend_db?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true
mysql.driver=com.mysql.jdbc.Driver
mysql.username=root
mysql.password=123456

# ---- PMML 模型配置 ----
pmml.model.path=recommend_model_champion.pmml

# ---- 推荐系统参数 ----
recommend.topk=10
recommend.predict.weight=0.7
recommend.popularity.weight=0.3
recommend.default.buy.rate=0.05
recommend.default.active.score=1.0
recommend.default.popularity=0.5
recommend.default.category.match=0

# ---- 滑动窗口配置 ----
window.size.minutes=5
window.slide.minutes=1

# ---- TopK 排序参数 ----
topk.flush.interval.ms=5000
